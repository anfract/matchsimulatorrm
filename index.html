<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Football Match Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Football Match Simulator</h1>
    <form id="simulator-form" class="card">
        <section class="settings-box">
          <h3>Teams &amp; Strength</h3>
          <p class="section-note">90+: World class, 85-89: Great, 80-84: Good, 75-79: Solid, 70-74: Decent, 65-69: Alright, 60-64: Bad, below 60: semi-pro levels.</p>
          <label>
            Home team
            <input id="homeTeam" type="text" placeholder="Home FC" value="Home FC">
          </label>

          <label>
            Away team
            <input id="awayTeam" type="text" placeholder="Away FC" value="Away FC">
          </label>

          <label>
            Home strength (1-100)
            <input id="homeStrength" type="number" min="1" max="100" value="70">
          </label>

          <label>
            Away strength (1-100)
            <input id="awayStrength" type="number" min="1" max="100" value="70">
          </label>
        </section>

        <section class="settings-box">
          <h3>Match Factors</h3>
          <div class="settings-grid">
            <label class="factor-field">
              Home fan support
              <select id="homeSupport">
                <option value="veryLow">Very Low</option>
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="factor-field">
              Home motivation
              <select id="homeMotivation">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="factor-field">
              Home fatigue
              <select id="homeFatigue">
                <option value="none" selected>None</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="factor-field">
              Home aggression
              <select id="homeAggression">
                <option value="veryLow">Very Low</option>
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="factor-field">
              Home approach
              <select id="homeApproach">
                <option value="veryOffensive">Very Offensive</option>
                <option value="offensive">Offensive</option>
                <option value="neutral" selected>Neutral</option>
                <option value="counterAttacking">Counter-Attacking</option>
                <option value="defensive">Defensive</option>
              </select>
            </label>

            <label class="factor-field">
              Home intensity
              <select id="homeIntensity">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="veryHigh">Very High</option>
              </select>
            </label>

            <label class="factor-field">
              Away fan support
              <select id="awaySupport">
                <option value="veryLow">Very Low</option>
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="factor-field">
              Away motivation
              <select id="awayMotivation">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="factor-field">
              Away fatigue
              <select id="awayFatigue">
                <option value="none" selected>None</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="factor-field">
              Away aggression
              <select id="awayAggression">
                <option value="veryLow">Very Low</option>
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </label>

            <label class="factor-field">
              Away approach
              <select id="awayApproach">
                <option value="veryOffensive">Very Offensive</option>
                <option value="offensive">Offensive</option>
                <option value="neutral" selected>Neutral</option>
                <option value="counterAttacking">Counter-Attacking</option>
                <option value="defensive">Defensive</option>
              </select>
            </label>

            <label class="factor-field">
              Away intensity
              <select id="awayIntensity">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="veryHigh">Very High</option>
              </select>
            </label>
          </div>
        </section>

        <button type="submit">Simulate Match</button>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
